services:
  database:
    image: postgres:16-alpine
    container_name: fantasy_database
    env_file:
      - ".env"
    ports:
      - "5430:5432"
    volumes:
      - ./database/db.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d fantasy"]
      interval: 5s
      timeout: 5s
      retries: 5
  api:
    build:
      context: ./Api/src
      dockerfile: Dockerfile
    ports:
      - "5001:8080"
    networks:
      - backend_net
    depends_on:
      database:
        condition: service_healthy
    env_file:
      - ".env"
volumes:
  postgres_data:

networks:
  backend_net:
    driver: bridge
